<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新規登録 — 納品把握システム（仮）</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/drawing_list.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
</head>
<body class="auth-body">
  <div class="login-card">
    <div class="login-logo">
      <span class="login-logo-text">納品把握システム（仮）</span>
    </div>

    <div class="login-title">新規登録</div>

    {% if error %}
    <div class="login-error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="{{ url_for('auth.register') }}">
      <div class="form-group">
        <label class="form-label" for="username">ユーザー名</label>
        <input
          type="text"
          id="username"
          name="username"
          class="form-input"
          placeholder="ユーザー名を入力"
          value="{{ username if username else '' }}"
          required
          autofocus
        >
      </div>
      <div class="form-group">
        <label class="form-label" for="password">パスワード</label>
        <input
          type="password"
          id="password"
          name="password"
          class="form-input"
          placeholder="6文字以上"
          required
        >
        <div class="form-hint">6文字以上で入力してください</div>
      </div>
      <div class="form-group">
        <label class="form-label" for="password2">パスワード（確認）</label>
        <input
          type="password"
          id="password2"
          name="password2"
          class="form-input"
          placeholder="もう一度入力"
          required
        >
      </div>
      <button type="submit" class="btn-login">登録する</button>
    </form>

    <div class="login-footer">
      すでにアカウントをお持ちの方は
      <a href="{{ url_for('auth.login') }}">ログイン</a>
    </div>
  </div>
</body>
</html>
