<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}納品把握システム（仮）{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/drawing_list.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/filter_addition.css') }}">
  {% block extra_css %}{% endblock %}
</head>
<body>

  <header>
    <div class="header-inner">
      <a class="logo" href="{{ url_for('drawing.drawing_list') }}">
        <span class="logo-text">納品把握システム（仮）</span>
      </a>

      <nav>
        <a class="nav-item {% block nav_drawing_list %}{% endblock %}" href="{{ url_for('drawing.drawing_list') }}">
          <span class="nav-icon">⊞</span> 図面一覧
        </a>
        <a class="nav-item {% block nav_vendor_list %}{% endblock %}" href="{{ url_for('main.vendor_list') }}">
          <span class="nav-icon">🏢</span> 発注先マスタ管理
        </a>
      </nav>

      <div class="header-right">
        <div class="user-chip">
          <div class="user-info">
            <div class="user-name">{{ current_user.username }}</div>
            <div class="user-role">{{ current_user.role }}</div>
          </div>
          <div class="avatar">👤</div>
        </div>
        <a href="{{ url_for('auth.logout') }}" class="btn-logout">ログアウト</a>
      </div>
    </div>
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer>
    © 2024 BLUEPRINT PRO MANAGEMENT SYSTEM. ALL RIGHTS RESERVED.
  </footer>

  {% block extra_js %}{% endblock %}

</body>
</html>
