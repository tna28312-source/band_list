{% extends "base.html" %}
{% block title %}発注先マスタ新規登録 | 納品把握システム{% endblock %}
{% block nav_vendor_list %}active{% endblock %}

{% block content %}
<div class="breadcrumb">
  <a href="{{ url_for('main.drawing_list') }}">図面一覧</a>
  <span>›</span>
  <a href="{{ url_for('main.vendor_list') }}">発注先マスタ一覧</a>
  <span>›</span>
  <span>新規登録</span>
</div>

<div class="page-header">
  <h1 class="page-title">発注先マスタ新規登録</h1>
</div>

<div class="card" style="max-width:560px; padding:32px 36px;">

  {% if error %}
  <div style="
    background:#fff0f0;
    border:1px solid #e0a0a0;
    border-radius:8px;
    padding:12px 16px;
    margin-bottom:24px;
    color:#c0392b;
    font-size:13.5px;
  ">{{ error }}</div>
  {% endif %}

  <form method="POST" action="{{ url_for('main.vendor_new') }}">

    <div class="form-group">
      <label class="form-label" for="name">会社名 <span style="color:var(--orange-deep)">*</span></label>
      <input
        class="form-input"
        type="text"
        id="name"
        name="name"
        placeholder="例：株式会社〇〇建設"
        value="{{ form_data.name if form_data else '' }}"
        required
      >
    </div>

    <div class="form-group">
      <label class="form-label" for="short_name">略称 <span style="color:var(--orange-deep)">*</span></label>
      <input
        class="form-input"
        type="text"
        id="short_name"
        name="short_name"
        placeholder="例：〇〇建設"
        value="{{ form_data.short_name if form_data else '' }}"
        required
      >
    </div>

    <div style="display:flex; gap:12px; margin-top:32px; flex-wrap:wrap;">
      <button type="submit" class="btn-photo" style="margin-left:0;">登録する</button>
      <a href="{{ url_for('main.vendor_list') }}" class="btn-new" style="margin-bottom:0;">キャンセル</a>
    </div>

  </form>
</div>
{% endblock %}
